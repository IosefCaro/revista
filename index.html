<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Revista Institucional – Colegio Iosef Caro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Lato:wght@300;400;700;900&family=EB+Garamond:ital,wght@0,400;1,400&display=swap');

:root {
  --navy: #1A2848;
  --gold: #C9A84C;
  --gold-dk: #8a6c1f;
  --gold-pale: #F5EDD0;
  --paper: #FAF7F1;
  --paper-dk: #F0E8D8;
  --ink: #1A1A2E;
  --muted: #6B6B8A;
  --rule: #D4C9A8;
  --white: #fff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Lato', sans-serif; background: #0E1628; color: var(--ink);
  min-height: 100vh; overscroll-behavior: none;
}

/* LOADING */
#loading {
  position: fixed; inset: 0; background: #0E1628;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 9999; transition: opacity .4s;
}
#loading .spin {
  width: 40px; height: 40px; border: 3px solid rgba(201,168,76,.2);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { font-family: 'Playfair Display', serif; font-style: italic; color: var(--gold); font-size: 15px; }

.preview-banner{
  position:sticky;top:0;z-index:200;background:#C89A4C;color:#1A1A2E;
  font-family:'Lato',sans-serif;font-weight:900;font-size:12px;letter-spacing:.5px;
  text-align:center;padding:10px 14px;text-transform:uppercase;
}

.empty-state {
  min-height: 100vh; display:flex; align-items:center; justify-content:center;
  text-align: center; padding: 60px 20px; color: rgba(255,255,255,.4);
}
.empty-state p { font-family: 'Playfair Display', serif; font-size: 17px; font-style: italic; }

.mag-app { display:none; flex-direction: column; min-height: 100vh; }

.mag-topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 22px; gap:12px; flex-wrap:wrap;
  background: linear-gradient(160deg,#0E1628 0%,var(--navy) 100%);
  border-bottom: 1px solid rgba(201,168,76,.2);
}
.mag-brand { display:flex; align-items:center; gap:10px; }
.mag-brand img { height: 26px; }
.mag-brand span {
  font-family:'Playfair Display',serif; font-weight:700; font-style:italic;
  font-size:14px; color:#fff;
}
.mag-select {
  background: rgba(255,255,255,.06); color: #fff; border: 1px solid rgba(201,168,76,.35);
  border-radius: 20px; padding: 7px 16px; font-family:'Lato',sans-serif;
  font-size: 10.5px; font-weight: 700; letter-spacing: .5px; cursor:pointer;
  max-width: 260px;
}
.mag-select option { background: var(--navy); color: #fff; }

.mag-stage {
  flex: 1; display:flex; align-items:center; justify-content:center;
  gap: 12px; padding: 22px 10px; position: relative; min-height: 0;
}
.mag-arrow {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid rgba(201,168,76,.35); background: rgba(255,255,255,.04);
  color: var(--gold); font-size: 20px; cursor: pointer;
  display:flex; align-items:center; justify-content:center;
  transition: all .15s; z-index: 5;
}
.mag-arrow:hover:not(:disabled) { background: var(--gold); color: #0E1628; }
.mag-arrow:disabled { opacity: .22; cursor: default; }

.mag-viewport {
  position: relative; overflow: hidden; border-radius: 8px; background: var(--paper);
  box-shadow: 0 30px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(201,168,76,.15);
  flex-shrink: 0;
}
.mag-track {
  display: flex; height: 100%;
  transition: transform .5s cubic-bezier(.65,0,.35,1);
  will-change: transform;
}
.mag-page {
  flex: 0 0 100%; height: 100%; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; background: var(--paper); position: relative;
}
.page-inner { padding: 26px 24px 28px; min-height: 100%; display:flex; flex-direction:column; }

.mag-footer {
  display:flex; align-items:center; justify-content:center; gap:18px;
  padding: 6px 20px 22px; flex-wrap:wrap;
}
.mag-mini-btn {
  background:none; border: 1px solid rgba(201,168,76,.3); color: var(--gold);
  font-family:'Lato',sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; padding: 8px 16px; border-radius: 20px; cursor: pointer;
  transition: all .15s;
}
.mag-mini-btn:hover { background: var(--gold); color: #0E1628; }
.mag-progress-wrap { display:flex; flex-direction:column; align-items:center; gap:6px; min-width: 140px; }
.mag-progress { width: 160px; height: 3px; background: rgba(255,255,255,.12); border-radius: 2px; overflow: hidden; }
.mag-progress-fill { height: 100%; background: var(--gold); transition: width .35s; }
.mag-page-num { font-family:'Lato',sans-serif; font-size: 9.5px; letter-spacing: 1.5px; color: rgba(255,255,255,.5); }

.page-cover .page-inner { padding: 0; position: relative; height: 100%; }
.cover-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.cover-img-fallback {
  position:absolute; inset:0; background: linear-gradient(160deg,#1A2848,#0E1628);
  display:flex; align-items:center; justify-content:center; font-size: 90px; color: rgba(201,168,76,.18);
  font-family:'Playfair Display',serif;
}
.cover-overlay {
  position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(14,22,40,.1) 0%, rgba(14,22,40,.45) 50%, rgba(14,22,40,.94) 100%);
}
.cover-content { position:absolute; left:0; right:0; bottom:0; padding: 26px 24px 30px; color:#fff; }
.cover-badge {
  font-family:'Lato',sans-serif; font-size: 9px; font-weight: 900; letter-spacing: 3px;
  text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
}
.cover-title {
  font-family:'Playfair Display',serif; font-weight: 900; font-size: clamp(24px,7vw,34px);
  line-height: 1.05; margin-bottom: 8px;
}
.cover-sub {
  font-family:'EB Garamond',serif; font-style: italic; font-size: 15px;
  color: rgba(255,255,255,.78); margin-bottom: 14px;
}
.cover-meta {
  display:flex; gap:16px; flex-wrap:wrap; font-size: 9.5px; letter-spacing: 1px;
  text-transform: uppercase; color: rgba(255,255,255,.6);
  border-top: 1px solid rgba(255,255,255,.2); padding-top: 12px;
}
.cover-hint {
  position:absolute; top:16px; right:18px; font-family:'Lato',sans-serif; font-size: 9px;
  letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.6);
}

.indice-titulo { font-family:'Playfair Display',serif; font-weight: 900; font-size: 23px; color: var(--ink); margin-bottom: 3px; }
.indice-sub {
  font-family:'Lato',sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--rule);
}
.indice-grupo-titulo {
  font-family:'Lato',sans-serif; font-size: 9px; font-weight: 900; letter-spacing: 2px;
  text-transform: uppercase; margin: 16px 0 6px;
}
.indice-item {
  display:flex; align-items:baseline; gap: 10px; width: 100%; text-align:left;
  background:none; border:none; border-bottom: 1px dotted var(--rule);
  padding: 9px 0; cursor: pointer; font-family:'EB Garamond',serif;
}
.indice-item:hover .indice-item-titulo { color: var(--gold-dk); }
.indice-item-titulo { flex:1; font-size: 14.5px; color: var(--ink); line-height:1.3; }
.indice-item-pag {
  font-family:'Lato',sans-serif; font-size: 10.5px; color: var(--muted); font-weight: 700; flex-shrink:0;
}
.indice-vacio {
  color: var(--muted); font-family:'EB Garamond',serif; font-style: italic; font-size: 14px;
  padding: 24px 0; text-align:center;
}

.page-articulo.tipo-comunicado .page-inner,
.page-articulo.tipo-aviso .page-inner { border-left: 5px solid var(--gold); }
.pg-kicker {
  display:flex; align-items:center; gap:8px; font-family:'Lato',sans-serif;
  font-size: 8.5px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 10px;
}
.pg-kicker::after { content:''; flex:1; max-width: 28px; height: 1px; background: currentColor; opacity: .4; }
.pg-titulo {
  font-family:'Playfair Display',serif; font-weight: 900; font-size: clamp(19px,4.5vw,24px);
  line-height: 1.12; color: var(--ink); margin-bottom: 8px;
}
.pg-bajada {
  font-family:'EB Garamond',serif; font-style: italic; font-size: 14px; line-height: 1.55;
  color: #38385A; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--rule);
}
.pg-cuerpo { font-family:'EB Garamond',serif; font-size: 14px; line-height: 1.75; color: var(--ink); flex:1; }
.pg-parrafos p { margin-bottom: 10px; }
.pg-parrafos p + p { text-indent: 1.1em; }
.pg-footer {
  margin-top: 18px; padding-top: 12px; border-top: 1px solid var(--rule);
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px;
  font-family:'Lato',sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
}

.bloque-imagen { margin: 16px 0; }
.bloque-imagen.layout-full img { width:100%; border-radius: 6px; display:block; }
.bloque-imagen.layout-left, .bloque-imagen.layout-right { width: 48%; margin-top: 4px; margin-bottom: 12px; }
.bloque-imagen.layout-left { float:left; margin-right: 16px; }
.bloque-imagen.layout-right { float:right; margin-left: 16px; }
.bloque-imagen.layout-left img, .bloque-imagen.layout-right img { width:100%; border-radius: 6px; display:block; }
.bloque-imagen figcaption {
  font-family:'Lato',sans-serif; font-size: 10.5px; font-style: italic; color: var(--muted);
  margin-top: 5px; line-height: 1.5;
}
.bloque-video { margin: 16px 0; clear: both; }
.video-embed {
  position:relative; width:100%; padding-bottom:56.25%; height:0; overflow:hidden;
  border-radius: 6px; background:#000;
}
.video-embed iframe, .video-embed video { position:absolute; top:0; left:0; width:100%; height:100%; border:0; }
.video-embed video { object-fit: contain; background:#000; }
.bloque-video figcaption {
  font-family:'Lato',sans-serif; font-size: 10.5px; font-style: italic; color: var(--muted);
  margin-top: 5px; line-height: 1.5;
}
.video-fallback-link {
  display:inline-block; padding: 9px 15px; border-radius: 6px; background: var(--gold);
  color:#fff; font-family:'Lato',sans-serif; font-size: 11.5px; font-weight: 700; text-decoration:none;
}

.page-fin .page-inner { align-items:center; justify-content:center; text-align:center; gap: 8px; }
.fin-estrella { font-size: 32px; color: var(--gold); margin-bottom: 4px; }
.fin-titulo { font-family:'Playfair Display',serif; font-style: italic; font-weight: 700; font-size: 19px; color: var(--ink); }
.fin-sub { font-family:'Lato',sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }

@media (max-width: 480px) {
  .mag-arrow { width: 34px; height: 34px; font-size: 17px; }
  .mag-stage { gap: 6px; padding: 14px 4px; }
  .mag-topbar { padding: 12px 14px; }
  .page-inner { padding: 20px 18px 22px; }
}
</style>
</head>
<body>

<div id="preview-banner-slot"></div>

<div id="loading">
  <div class="spin"></div>
  <p>Cargando revista…</p>
</div>

<div class="empty-state" id="empty-state" style="display:none"><p>No hay ediciones publicadas aún.</p></div>

<div class="mag-app" id="mag-app">
  <header class="mag-topbar">
    <div class="mag-brand">
      <img src="https://i.ibb.co/hF7Sqzw5/Logo-blanco.png" alt="Logo" onerror="this.style.display='none'">
      <span>Colegio Rabino Iosef Caro</span>
    </div>
    <select class="mag-select" id="edicion-switch" onchange="cambiarEdicionSwitch(this.value)"></select>
  </header>

  <div class="mag-stage">
    <button class="mag-arrow" id="btn-prev" aria-label="Página anterior">‹</button>
    <div class="mag-viewport" id="mag-viewport">
      <div class="mag-track" id="mag-track"></div>
    </div>
    <button class="mag-arrow" id="btn-next" aria-label="Página siguiente">›</button>
  </div>

  <div class="mag-footer">
    <button class="mag-mini-btn" onclick="irAIndice()">☰ Índice</button>
    <div class="mag-progress-wrap">
      <div class="mag-progress"><div class="mag-progress-fill" id="progress-fill"></div></div>
      <div class="mag-page-num" id="page-indicator">1 / 1</div>
    </div>
    <button class="mag-mini-btn" onclick="irATapa()">📖 Tapa</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, getDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGGYTx7Hj4G2IbYxkxm5rx25sVKDy4DYA",
  authDomain: "revista-1ac1c.firebaseapp.com",
  projectId: "revista-1ac1c",
  storageBucket: "revista-1ac1c.firebasestorage.app",
  messagingSenderId: "137545616566",
  appId: "1:137545616566:web:f74736d93682e2727dea17"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const NIVELES = {
  institucional: { label: 'Institucional', color: '#C9A84C', icon: '■' },
  inicial:       { label: 'Nivel Inicial',    color: '#C07030', icon: '✦' },
  primaria:      { label: 'Nivel Primario',   color: '#2A7A50', icon: '◆' },
  secundaria:    { label: 'Nivel Secundario', color: '#2A50A0', icon: '▲' },
  reshit:        { label: 'Reshit',           color: '#7030A0', icon: '✡' },
};

const TIPOS = {
  noticia:      'Noticia',
  galeria:      'Galería',
  proyecto:     'Proyecto',
  evento:       'Evento',
  comunicado:   'Comunicado',
  aviso:        'Aviso',
};

let todasEdiciones = [];
let edicionActual = null;
let articulosActuales = [];
let paginas = [];
let paginaActual = 0;
let modoPreview = false;

async function init() {
  try {
    const params = new URLSearchParams(location.search);
    const previewId = params.get('previewEdicion');

    if (previewId) {
      const sn = await getDoc(doc(db, 'ediciones', previewId));
      if (!sn.exists()) {
        ocultarLoading();
        mostrarVacio('Esa edición no existe.');
        return;
      }
      modoPreview = true;
      todasEdiciones = [{ id: sn.id, ...sn.data() }];
      mostrarBannerPreview();
      await cargarEdicion(todasEdiciones[0]);
      mostrarApp();
      ocultarLoading();
      return;
    }

    const snEdiciones = await getDocs(query(collection(db, 'ediciones'), orderBy('fechaInicio', 'desc')));
    todasEdiciones = snEdiciones.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(e => e.estado === 'publicada');

    if (!todasEdiciones.length) {
      ocultarLoading();
      mostrarVacio('No hay ediciones publicadas aún.');
      return;
    }

    await cargarEdicion(todasEdiciones[0]);
    mostrarApp();
    ocultarLoading();
  } catch (e) {
    console.error(e);
    ocultarLoading();
    mostrarVacio('Error al cargar. Intentá de nuevo.');
  }
}

function mostrarVacio(msg) {
  const el = document.getElementById('empty-state');
  el.querySelector('p').textContent = msg;
  el.style.display = 'flex';
}

function mostrarApp() {
  document.getElementById('mag-app').style.display = 'flex';
  requestAnimationFrame(ajustarViewport);
}

async function cargarEdicion(edicion) {
  edicionActual = edicion;

  const snArts = await getDocs(
    query(
      collection(db, 'articulos'),
      where('edicionId', '==', edicion.id),
      where('estado', '==', 'publicado')
    )
  );
  articulosActuales = snArts.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => (a.orden ?? 99) - (b.orden ?? 99));

  construirPaginas();
  renderPaginas();
  renderEdicionSwitch();
}

window.cambiarEdicionSwitch = async function(edId) {
  const ed = todasEdiciones.find(e => e.id === edId);
  if (!ed) return;
  document.getElementById('mag-track').innerHTML = '';
  await cargarEdicion(ed);
};

function renderEdicionSwitch() {
  const sel = document.getElementById('edicion-switch');
  sel.innerHTML = todasEdiciones.map(e =>
    `<option value="${e.id}">${e.numero ? 'Ed. ' + e.numero + ' – ' : ''}Semana del ${formatFechaCorta(e.fechaInicio)}</option>`
  ).join('');
  sel.value = edicionActual?.id || '';
}

function construirPaginas() {
  paginas = [];
  paginas.push({ tipo: 'cover' });
  paginas.push({ tipo: 'indice' });
  articulosActuales.forEach(art => paginas.push({ tipo: 'articulo', art }));
  paginas.push({ tipo: 'fin' });
}

function renderPaginas() {
  const track = document.getElementById('mag-track');
  track.innerHTML = paginas.map(p => htmlPagina(p)).join('');
  irAPagina(0, false);
}

function htmlPagina(p) {
  if (p.tipo === 'cover')    return htmlPortada();
  if (p.tipo === 'indice')   return htmlIndice();
  if (p.tipo === 'articulo') return htmlArticuloPagina(p.art);
  if (p.tipo === 'fin')      return htmlFin();
  return '';
}

function imagenPortada() {
  const conImg = articulosActuales.find(a => a.imagenUrl && a.imagenUrl.trim());
  return conImg ? driveUrl(conImg.imagenUrl) : '';
}

function htmlPortada() {
  const img = imagenPortada();
  return `
    <div class="mag-page page-cover">
      <div class="page-inner">
        ${img
          ? `<img class="cover-img" src="${img}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'cover-img-fallback',textContent:'✡'}))">`
          : `<div class="cover-img-fallback">✡</div>`}
        <div class="cover-overlay"></div>
        <div class="cover-hint">Deslizá o tocá las flechas ›</div>
        <div class="cover-content">
          <div class="cover-badge">Edición ${edicionActual?.numero || ''}</div>
          <div class="cover-title">${edicionActual?.titulo || 'Revista Institucional'}</div>
          <div class="cover-sub">${edicionActual?.subtitulo || 'Colegio Rabino Iosef Caro'}</div>
          <div class="cover-meta">
            <span>Semana del ${formatFecha(edicionActual?.fechaInicio)}</span>
            <span>${articulosActuales.length} nota${articulosActuales.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
      </div>
    </div>`;
}

function htmlIndice() {
  const grupos = {};
  const orden = ['institucional','inicial','primaria','secundaria','reshit'];
  articulosActuales.forEach((a, i) => {
    const n = a.nivel || 'institucional';
    (grupos[n] = grupos[n] || []).push({ ...a, _pagina: i + 2 });
  });
  const clavesOrdenadas = Object.keys(grupos).sort((a,b) => orden.indexOf(a) - orden.indexOf(b));

  let html = `
    <div class="mag-page page-indice">
      <div class="page-inner">
        <div class="indice-titulo">Índice</div>
        <div class="indice-sub">${edicionActual?.titulo || ''}</div>`;

  if (!articulosActuales.length) {
    html += `<div class="indice-vacio">Todavía no hay notas cargadas en esta edición.</div>`;
  } else {
    clavesOrdenadas.forEach(nKey => {
      const niv = NIVELES[nKey] || { label: nKey, color: '#888', icon: '·' };
      html += `<div class="indice-grupo-titulo" style="color:${niv.color}">${niv.icon} ${niv.label}</div>`;
      grupos[nKey].forEach(a => {
        html += `
          <button class="indice-item" onclick="irAPagina(${a._pagina})">
            <span class="indice-item-titulo">${a.titulo || 'Sin título'}</span>
            <span class="indice-item-pag">${String(a._pagina + 1).padStart(2,'0')}</span>
          </button>`;
      });
    });
  }

  html += `</div></div>`;
  return html;
}

function htmlArticuloPagina(art) {
  const niv = NIVELES[art.nivel] || { label: art.nivel, color: '#888', icon: '·' };
  const tipo = TIPOS[art.tipo] || art.tipo || '';
  const tipoClass = ['comunicado','aviso'].includes(art.tipo) ? ` tipo-${art.tipo}` : '';
  return `
    <div class="mag-page page-articulo${tipoClass}">
      <div class="page-inner">
        <div class="pg-kicker" style="color:${niv.color}">${niv.icon} ${niv.label} &nbsp;·&nbsp; ${tipo}</div>
        <div class="pg-titulo">${art.titulo || ''}</div>
        ${art.bajada ? `<div class="pg-bajada">${art.bajada}</div>` : ''}
        <div class="pg-cuerpo">${renderContenidoCompleto(art)}</div>
        <div class="pg-footer">
          <span>${art.autor || ''}${art.sala ? ' · ' + art.sala : ''}</span>
          <span>${art.fecha || ''}</span>
        </div>
      </div>
    </div>`;
}

function htmlFin() {
  return `
    <div class="mag-page page-fin">
      <div class="page-inner">
        <div class="fin-estrella">✡</div>
        <div class="fin-titulo">Fin de esta edición</div>
        <div class="fin-sub">Colegio Rabino Iosef Caro · Belgrano, Buenos Aires</div>
        <button class="mag-mini-btn" style="margin-top:14px" onclick="irATapa()">↺ Volver a la tapa</button>
      </div>
    </div>`;
}

function renderContenidoCompleto(art) {
  if (Array.isArray(art.bloques) && art.bloques.length) {
    return art.bloques.map(b => {
      if (b.tipo === 'texto' && b.texto && b.texto.trim()) {
        return `<div class="pg-parrafos">${formatCuerpo(b.texto)}</div>`;
      }
      if (b.tipo === 'imagen' && b.url && b.url.trim()) {
        return renderBloqueImagen(b);
      }
      if (b.tipo === 'video' && b.url && b.url.trim()) {
        return `<div class="bloque-video">${embedVideo(b.url)}${b.caption ? `<figcaption>${esc(b.caption)}</figcaption>` : ''}</div>`;
      }
      return '';
    }).join('');
  }
  return art.cuerpo
    ? `<div class="pg-parrafos">${formatCuerpo(art.cuerpo)}</div>`
    : '<div class="pg-parrafos" style="color:var(--muted);font-style:italic">Sin contenido.</div>';
}

function renderBloqueImagen(b) {
  const layout = ['left','right'].includes(b.layout) ? b.layout : 'full';
  return `
    <figure class="bloque-imagen layout-${layout}">
      <img src="${driveUrl(b.url)}" alt="${esc(b.caption || '')}" loading="lazy" onerror="this.parentElement.style.display='none'">
      ${b.caption ? `<figcaption>${esc(b.caption)}</figcaption>` : ''}
    </figure>`;
}

function embedVideo(url) {
  url = (url || '').trim();
  let m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
  if (m) return `<div class="video-embed"><iframe src="https://www.youtube.com/embed/${m[1]}" allowfullscreen loading="lazy" title="Video"></iframe></div>`;
  m = url.match(/vimeo\.com\/(\d+)/);
  if (m) return `<div class="video-embed"><iframe src="https://player.vimeo.com/video/${m[1]}" allowfullscreen loading="lazy" title="Video"></iframe></div>`;
  m = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if (m) return `<div class="video-embed"><iframe src="https://drive.google.com/file/d/${m[1]}/preview" allowfullscreen loading="lazy" title="Video"></iframe></div>`;
  if (/\.(mp4|webm|ogg)(\?.*)?$/i.test(url)) {
    return `<div class="video-embed"><video controls src="${url}"></video></div>`;
  }
  return `<a href="${url}" target="_blank" rel="noopener" class="video-fallback-link">▶ Ver video</a>`;
}

function irAPagina(i, animar = true) {
  if (!paginas.length) return;
  paginaActual = Math.max(0, Math.min(i, paginas.length - 1));
  const track = document.getElementById('mag-track');
  track.style.transition = animar ? '' : 'none';
  track.style.transform = `translateX(-${paginaActual * 100}%)`;
  if (!animar) requestAnimationFrame(() => { track.style.transition = ''; });
  actualizarControles();
}
window.irAPagina = irAPagina;
window.irATapa = () => irAPagina(0);
window.irAIndice = () => irAPagina(1);

function paginaSiguiente() { irAPagina(paginaActual + 1); }
function paginaAnterior()  { irAPagina(paginaActual - 1); }

function actualizarControles() {
  document.getElementById('btn-prev').disabled = paginaActual === 0;
  document.getElementById('btn-next').disabled = paginaActual === paginas.length - 1;
  document.getElementById('page-indicator').textContent = `${paginaActual + 1} / ${paginas.length}`;
  const pct = paginas.length > 1 ? (paginaActual / (paginas.length - 1)) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

document.getElementById('btn-prev').addEventListener('click', paginaAnterior);
document.getElementById('btn-next').addEventListener('click', paginaSiguiente);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') paginaSiguiente();
  if (e.key === 'ArrowLeft') paginaAnterior();
});

let touchX = 0, touchY = 0;
const viewportEl = document.getElementById('mag-viewport');
viewportEl.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX; touchY = e.touches[0].clientY;
}, { passive: true });
viewportEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) {
    if (dx < 0) paginaSiguiente(); else paginaAnterior();
  }
}, { passive: true });

function ajustarViewport() {
  const vp = document.getElementById('mag-viewport');
  const stage = document.querySelector('.mag-stage');
  if (!vp || !stage) return;
  const arrow = document.getElementById('btn-prev');
  const arrowW = arrow ? arrow.offsetWidth : 40;
  const stageStyles = getComputedStyle(stage);
  const gap = parseFloat(stageStyles.gap) || 10;
  const padX = parseFloat(stageStyles.paddingLeft) + parseFloat(stageStyles.paddingRight);
  const padY = parseFloat(stageStyles.paddingTop) + parseFloat(stageStyles.paddingBottom);

  const availW = stage.clientWidth - padX - (arrowW + gap) * 2;
  const availH = stage.clientHeight - padY;

  const RATIO = 3 / 4;
  let w = Math.min(560, availW);
  let h = w / RATIO;
  if (h > availH) { h = availH; w = h * RATIO; }

  vp.style.width  = Math.max(w, 220) + 'px';
  vp.style.height = Math.max(h, 300) + 'px';
}
window.addEventListener('resize', ajustarViewport);

function driveUrl(url) {
  if (!url) return '';
  const m = url.match(/\/d\/([^/]+)/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  return url;
}

function esc(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function mostrarBannerPreview() {
  document.getElementById('preview-banner-slot').innerHTML =
    '<div class="preview-banner">👁 Vista previa — esta edición todavía NO está publicada. Las familias no la ven así.</div>';
}

function formatCuerpo(texto) {
  if (!texto) return '';
  return texto.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
}

function formatFecha(ts) {
  if (!ts) return '—';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' });
  } catch { return String(ts); }
}

function formatFechaCorta(ts) {
  if (!ts) return '—';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
  } catch { return String(ts); }
}

function ocultarLoading() {
  const l = document.getElementById('loading');
  l.style.opacity = '0';
  setTimeout(() => l.remove(), 400);
}

init();
</script>
</body>
</html>
